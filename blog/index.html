<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Blog — TamoWork | AI Automation for Small Business</title>
  <meta name="description" content="685+ guides on AI automation for small businesses — Instagram, WhatsApp, and beyond. Free, local AI employee for every business type."/>
  <link rel="canonical" href="https://tamowork.com/blog/"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#07080b;--bg2:#0c1018;--card:#111820;--text:#eef2f9;--muted:#8394b0;--dim:#4e5c72;
      --line:rgba(255,255,255,0.07);--green:#16c784;
      --brand:linear-gradient(135deg,#6366f1 0%,#8b5cf6 50%,#a855f7 100%);
      --brand-soft:rgba(99,102,241,0.08);--brand-border:rgba(99,102,241,0.20);
    }
    html{scroll-behavior:smooth}
    body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);line-height:1.6;overflow-x:hidden;-webkit-font-smoothing:antialiased}
    a{text-decoration:none;color:inherit}
    .wrap{width:100%;max-width:1100px;margin:0 auto;padding:0 24px}
    .nav{position:sticky;top:0;z-index:200;background:rgba(7,8,11,0.92);backdrop-filter:blur(24px);border-bottom:1px solid var(--line)}
    .nav-inner{min-height:64px;display:flex;align-items:center;justify-content:space-between}
    .logo span{font-size:19px;font-weight:900;letter-spacing:-.5px;background:var(--brand);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .nav-btn{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border-radius:14px;font-size:14px;font-weight:800;background:var(--brand);color:#fff;border:none;cursor:pointer;font-family:inherit;transition:.15s}
    .nav-btn:hover{opacity:.88;transform:translateY(-1px)}
    .hero{background:var(--bg2);border-bottom:1px solid var(--line);padding:64px 0 52px}
    .hero h1{font-size:clamp(28px,4vw,42px);font-weight:900;letter-spacing:-.5px;margin-bottom:14px}
    .hero h1 span{background:var(--brand);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .hero p{font-size:17px;color:var(--muted);max-width:520px;margin-bottom:24px}
    .filters{display:flex;gap:10px;flex-wrap:wrap;margin-top:24px}
    .filter-btn{padding:8px 18px;border-radius:999px;border:1px solid var(--line);background:transparent;color:var(--muted);font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:.15s}
    .filter-btn:hover,.filter-btn.active{background:var(--brand-soft);border-color:var(--brand-border);color:#818cf8}
    .search-wrap{margin-top:16px}
    .search-input{width:100%;max-width:400px;padding:10px 16px;background:var(--card);border:1px solid var(--line);border-radius:14px;color:var(--text);font-family:inherit;font-size:14px;outline:none;transition:.15s}
    .search-input:focus{border-color:var(--brand-border)}
    .search-input::placeholder{color:var(--dim)}
    .posts{padding:48px 0 96px}
    .posts-count{font-size:13px;color:var(--dim);font-weight:600;text-transform:uppercase;letter-spacing:1px;margin-bottom:32px}
    .posts-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px}
    .post-card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:24px;transition:.2s ease;display:flex;flex-direction:column;gap:10px}
    .post-card:hover{border-color:rgba(99,102,241,0.30);transform:translateY(-2px);box-shadow:0 12px 40px rgba(0,0,0,0.3)}
    .post-lang{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;padding:3px 8px;border-radius:999px;background:var(--brand-soft);border:1px solid var(--brand-border);color:#818cf8;display:inline-block;width:fit-content}
    .post-card h2{font-size:16px;font-weight:800;letter-spacing:-.2px;line-height:1.35;flex:1}
    .post-card p{font-size:13px;color:var(--muted);line-height:1.6}
    .post-link{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:700;color:#818cf8;margin-top:4px}
    .load-more{display:block;margin:40px auto 0;padding:14px 40px;border-radius:14px;background:var(--card);border:1px solid var(--brand-border);color:#818cf8;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;transition:.15s}
    .load-more:hover{background:var(--brand-soft)}
    .load-more:disabled{opacity:.4;cursor:default}
    .footer{border-top:1px solid var(--line);padding:40px 0;text-align:center}
    .footer p{font-size:13px;color:var(--dim)}
    .footer a{color:var(--muted)}.footer a:hover{color:var(--text)}
    #no-results{display:none;text-align:center;padding:60px 0;color:var(--muted)}
  </style>
</head>
<body>
  <nav class="nav">
    <div class="wrap">
      <div class="nav-inner">
        <a href="https://tamowork.com" class="logo"><span>TamoWork</span></a>
        <a href="https://tamowork.com" class="nav-btn">⬇ Download free</a>
      </div>
    </div>
  </nav>

  <section class="hero">
    <div class="wrap">
      <h1>TamoWork <span>Blog</span></h1>
      <p>685+ guides on AI automation for small businesses — Instagram, WhatsApp, and beyond.</p>
      <div class="filters">
        <button class="filter-btn active" data-lang="all">All languages</button>
        <button class="filter-btn" data-lang="pt-BR">Português</button>
        <button class="filter-btn" data-lang="en">English</button>
        <button class="filter-btn" data-lang="es">Español</button>
      </div>
      <div class="search-wrap">
        <input class="search-input" type="text" placeholder="Search articles..." id="searchInput"/>
      </div>
    </div>
  </section>

  <section class="posts">
    <div class="wrap">
      <div class="posts-count" id="postsCount">Loading...</div>
      <div class="posts-grid" id="postsGrid"></div>
      <div id="no-results">No articles found. Try a different search.</div>
      <button class="load-more" id="loadMore">Load more articles</button>
    </div>
  </section>

  <footer class="footer">
    <div class="wrap">
      <p><a href="https://tamowork.com">TamoWork</a> · Free AI employee for small businesses · <a href="https://tamowork.com">tamowork.com</a></p>
    </div>
  </footer>

  <script>
    let allPosts = [];
    let filtered = [];
    let shown = 0;
    const PAGE = 48;
    let currentLang = 'all';
    let searchQuery = '';

    const langLabel = {'pt-BR':'PT','en':'EN','es':'ES'};

    function getLangTag(lang) {
      return langLabel[lang] || lang;
    }

    function renderCards(posts, append) {
      const grid = document.getElementById('postsGrid');
      if (!append) grid.innerHTML = '';
      const slice = posts.slice(shown, shown + PAGE);
      slice.forEach(post => {
        const a = document.createElement('a');
        a.href = '/blog/' + post.slug + '.html';
        a.className = 'post-card';
        a.innerHTML = '<span class="post-lang">' + getLangTag(post.lang) + '</span>' +
          '<h2>' + post.title + '</h2>' +
          (post.description ? '<p>' + post.description.slice(0, 100) + (post.description.length > 100 ? '…' : '') + '</p>' : '') +
          '<span class="post-link">Read →</span>';
        grid.appendChild(a);
      });
      shown += slice.length;
    }

    function applyFilters() {
      shown = 0;
      filtered = allPosts.filter(p => {
        const langOk = currentLang === 'all' || p.lang === currentLang;
        const q = searchQuery.toLowerCase();
        const searchOk = !q || p.title.toLowerCase().includes(q) || (p.description || '').toLowerCase().includes(q);
        return langOk && searchOk;
      });
      renderCards(filtered, false);
      document.getElementById('postsCount').textContent = filtered.length + ' articles';
      document.getElementById('no-results').style.display = filtered.length === 0 ? 'block' : 'none';
      const btn = document.getElementById('loadMore');
      btn.style.display = shown >= filtered.length ? 'none' : 'block';
    }

    // Filter buttons
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentLang = btn.dataset.lang;
        applyFilters();
      });
    });

    // Search
    let searchTimer;
    document.getElementById('searchInput').addEventListener('input', e => {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => {
        searchQuery = e.target.value;
        applyFilters();
      }, 250);
    });

    // Load more
    document.getElementById('loadMore').addEventListener('click', () => {
      renderCards(filtered, true);
      if (shown >= filtered.length) {
        document.getElementById('loadMore').style.display = 'none';
      }
    });

    // Load posts.json
    fetch('/blog/posts.json')
      .then(r => r.json())
      .then(data => {
        allPosts = data;
        applyFilters();
      });
  </script>
</body>
</html>
